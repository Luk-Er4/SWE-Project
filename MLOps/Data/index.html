<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>User Comparison Chart</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>

<body>
  <h1>User Comparison Chart</h1>

  <div id="status">Loading...</div>
  <div id="summary"></div>
  <div id="chart" style="width: 100%; height: 1800px;"></div>

  <script>
    async function loadChart() {
      const status = document.getElementById("status");

      try {
        const response = await fetch("http://127.0.0.1:8001/api/user/comparison-chart", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        user_name: "Euijin",
        sleep_hours: 7,
        physical_activity: 1.5,
        diet_calories: 2200,
        health_risk: 35,
        health_score: 15
    })
    });

        status.innerHTML = `API status: ${response.status}`;

        const result = await response.json();

        console.log("API result:", result);

        document.getElementById("summary").innerHTML = result.summary
          .map(item => `<p>• ${item.message}</p>`)
          .join("");

        let figure = result.figure;

        // FastAPI에서 fig.to_json() 문자열로 보냈을 경우 대비
        if (typeof figure === "string") {
          figure = JSON.parse(figure);
        }

        Plotly.newPlot(
          "chart",
          figure.data,
          figure.layout,
          { responsive: true }
        );

        status.innerHTML = "Chart loaded.";

      } catch (error) {
        console.error(error);
        status.innerHTML = "Error: " + error.message;
      }
    }

    loadChart();
  </script>
</body>
</html>
