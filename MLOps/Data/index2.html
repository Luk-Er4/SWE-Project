<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>User Comparison Chart</title>
</head>

<body>
  <h1>User Comparison Chart</h1>

  <div id="status">Loading...</div>
  <div id="summary"></div>
  <div id="chart" style="width: 100%;"></div>

  <script>
    async function loadChart() {
      const status = document.getElementById("status");

      try {
        const response = await fetch("http://127.0.0.1:8001/api/user/create_dashboard", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_name: "Euijin",
            sleep_hours: 7,
            physical_activity: 1.5,
            diet_calories: 2200,
            health_risk: 35,
            health_score: 15
          })
        });

        status.innerHTML = `API status: ${response.status}`;

        const result = await response.json();

        console.log("API result:", result);

        document.getElementById("summary").innerHTML = result.summary
          .map(item => `<p>• ${item.message}</p>`)
          .join("");

        const img = document.createElement("img");
        img.src = "data:image/png;base64," + result.figure.image_base64;
        img.style.width = "100%";
        img.style.maxWidth = "1000px";
        img.style.display = "block";

        const chartDiv = document.getElementById("chart");
        chartDiv.innerHTML = "";
        chartDiv.appendChild(img);

        status.innerHTML = "Chart loaded.";

      } catch (error) {
        console.error(error);
        status.innerHTML = "Error: " + error.message;
      }
    }

    loadChart();
  </script>
</body>
</html>
