<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>
<body>
  <div style="text-align:center; margin-top:100px;">
    <h3 id="apiMessage">Loading...</h3>

    <form action="http://127.0.0.1:8000/welcome/login_page/result/" method="get">
      <input type="text" name="id" placeholder="Enter ID" /><br /><br />
      <input type="password" name="pw" placeholder="Enter Password" /><br /><br />
      <button type="submit">Login</button>
    </form>

    <p id="debug" style="margin-top:20px; font-family:monospace;"></p>
  </div>

  <script>
    (async () => {
      const msgEl = document.getElementById("apiMessage");
      const debugEl = document.getElementById("debug");

      const url = "http://127.0.0.1:8000/welcome/login_page/";
      debugEl.textContent = "Fetching: " + url;

      try {
        const res = await fetch(url, { method: "GET" });

        debugEl.textContent += " | status=" + res.status;

        const text = await res.text();     // 먼저 text로 받고
        debugEl.textContent += " | raw=" + text;

        const data = JSON.parse(text);     // JSON으로 파싱
        msgEl.textContent = data.message || "(no message field)";
      } catch (e) {
        msgEl.textContent = "Failed to load message";
        debugEl.textContent += " | ERROR=" + e;
        console.error(e);
      }
    })();
  </script>
</body>
</html>
